# WACC mặc định theo ngành — dùng khi không tính được WACC từ dữ liệu thực
# Công thức: WACC = Ke*E/(D+E) + Kd*(1-T)*D/(D+E)
# Risk-free rate: 4.8% (TP CP 10Y)
# Equity risk premium (VN): 8.5%

# Kịch bản: base | pessimistic (WACC+2%) | optimistic (WACC-1%)
# Tăng trưởng terminal: 3% (tương đương lạm phát mục tiêu VN dài hạn)

banking:
  base_wacc: 0.12              # 12% — chi phí vốn ngân hàng thấp hơn
  terminal_growth: 0.03
  fcf_growth_base: 0.12
