[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long — handled by formatter, not enforcer
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E402"]  # test files may import after fixtures

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v"
markers = [
    "live: requires real network access (deselected by default)",
]
